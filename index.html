<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>han zi</title>
    <link rel="stylesheet" href="app.css">
    <script defer src="./index.js" type="module"></script>
  </head>

  <body>
    <h1>Han zi</h1>
    <p>Input the <i>pinyin</i> that corresponds to the displayed <i>han</i> character.</p>
    <p>Use the provided controls to set the correct tone.</p>
    <div id="app">
      <div id="han-container">
        <span id="loading">Loading...</span>
      </div>
      <div class="btn-group-horiz">
        <button id="check" class="primary">Check</button>
        <button id="reveal" class="primary">Reveal</button>
        <button id="refresh" class="primary">Refresh</button>
      </div>
      <a href="https://github.com/albert-yu/han-zi">GitHub Repo</a>
    </div>
  </body>
</html>
